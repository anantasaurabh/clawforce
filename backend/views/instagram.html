<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawforce | Instagram Post Approval Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfcfd;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .status-tab.active {
            background-color: white;
            color: #db2777;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <div id="app" class="max-w-4xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="flex flex-col md:flex-row items-start md:items-center justify-between mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-900 flex items-center gap-3">
                    <span class="bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 text-white p-2 rounded-xl">
                        <i data-lucide="instagram" class="w-6 h-6"></i>
                    </span>
                    Instagram Approval Center
                </h1>
                <p class="text-slate-500 font-medium mt-2">Review, edit, and schedule autonomous Instagram Business posts.</p>
            </div>
            <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
                <a id="back-link" href="#" class="w-full md:w-auto px-6 py-3 bg-white border border-slate-200 text-slate-500 font-black text-xs uppercase tracking-widest rounded-xl hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Dashboard
                </a>
                <button onclick="openCreateModal()" class="w-full md:w-auto px-6 py-3 bg-pink-600 text-white font-black text-xs uppercase tracking-widest rounded-xl hover:bg-pink-700 transition-all shadow-lg shadow-pink-600/20 flex items-center justify-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> Create New Post
                </button>
            </div>
        </header>

        <!-- Filters -->
        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <div class="bg-slate-200/50 p-1.5 rounded-2xl flex gap-1 overflow-x-auto no-scrollbar flex-1">
                <button onclick="setStatusFilter('pending')" id="tab-pending" class="status-tab flex-1 py-3 px-6 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-slate-700 transition-all whitespace-nowrap">
                    Pending
                </button>
                <button onclick="setStatusFilter('approved')" id="tab-approved" class="status-tab flex-1 py-3 px-6 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-slate-700 transition-all whitespace-nowrap">
                    Approved
                </button>
                <button onclick="setStatusFilter('rejected')" id="tab-rejected" class="status-tab flex-1 py-3 px-6 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-slate-700 transition-all whitespace-nowrap">
                    Rejected
                </button>
                <button onclick="setStatusFilter('all')" id="tab-all" class="status-tab active flex-1 py-3 px-6 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-slate-700 transition-all whitespace-nowrap">
                    All Posts
                </button>
            </div>
            
            <div class="relative min-w-[200px]">
                <select id="account-filter" onchange="setAccountFilter(this.value)" class="w-full bg-white border border-slate-200 rounded-2xl px-6 py-4 text-xs font-black uppercase tracking-widest text-slate-500 focus:outline-none focus:ring-2 focus:ring-pink-500 appearance-none cursor-pointer shadow-sm">
                    <option value="all">All Accounts</option>
                </select>
                <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div id="content" class="space-y-6">
            <!-- Loading State -->
            <div id="loading" class="py-20 text-center">
                <div class="inline-block animate-spin text-pink-600 mb-4">
                    <i data-lucide="loader-2" class="w-8 h-8"></i>
                </div>
                <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">Querying Data Nodes...</p>
            </div>

            <!-- Empty State -->
            <div id="empty" class="hidden py-20 bg-white rounded-[2rem] border border-slate-100 shadow-xl shadow-slate-200/20 text-center space-y-4">
                <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto text-slate-200">
                    <i data-lucide="check-circle-2" class="w-8 h-8"></i>
                </div>
                <div>
                    <p class="text-slate-900 font-black uppercase tracking-widest text-sm">No Posts Found</p>
                    <p class="text-slate-400 text-xs font-medium">No operations queued for evaluation.</p>
                </div>
            </div>

            <!-- Delete All Action -->
            <div id="batch-actions" class="hidden flex justify-end">
                <button onclick="deleteAllMatching()" class="text-[10px] font-black uppercase tracking-widest text-red-500 hover:text-red-700 transition-all flex items-center gap-2 px-4 py-2 bg-red-50 rounded-lg border border-red-100 hover:bg-red-100">
                    <i data-lucide="trash-2" class="w-3 h-3"></i> Delete All Matching Posts
                </button>
            </div>

            <!-- Posts List -->
            <div id="posts-list" class="grid gap-6"></div>

        </div>
    </div>

    <!-- Create Post Modal -->
    <div id="create-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeCreateModal()"></div>
        <div class="bg-white max-w-2xl w-full rounded-[1.5rem] shadow-2xl relative overflow-hidden animate-in fade-in zoom-in-95 duration-300">
            <div class="p-8 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-black text-slate-900 uppercase tracking-tight">Draft New Instagram Post</h2>
                    <button onclick="closeCreateModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
                </div>
                
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Post Content</label>
                        <textarea id="new-content" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-pink-500 focus:outline-none text-sm font-medium text-slate-700 min-h-[150px] custom-scrollbar" placeholder="Write your caption..."></textarea>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Media URL (Image/Video)</label>
                            <input id="new-media" type="url" class="w-full px-4 py-2 rounded-lg border border-slate-200 text-xs font-medium" placeholder="https://...">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Schedule Publication</label>
                            <input id="new-date" type="datetime-local" class="w-full px-4 py-2 rounded-lg border border-slate-200 text-xs font-medium">
                        </div>
                    </div>
                </div>

                <div class="flex gap-4 pt-2">
                    <button id="submit-create-btn" onclick="submitCreatePost()" class="flex-1 bg-pink-600 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-pink-700 transition-all shadow-lg shadow-pink-600/20 flex items-center justify-center gap-2">
                        <i data-lucide="send" class="w-4 h-4"></i> Create & Queue Post
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let currentAccountFilter = 'all';
        let posts = [];
        let editingPostId = null;

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        const token = urlParams.get('token');
        const agentId = 'instagram-manager';

        document.getElementById('back-link').href = `/review?userId=${userId}&token=${token}`;

        function setStatusFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.status-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${filter}`).classList.add('active');
            fetchPosts();
        }

        function setAccountFilter(accountUrn) {
            currentAccountFilter = accountUrn;
            renderPosts();
        }

        async function fetchPosts() {
            if (!userId || !token) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">Authentication Exception</p>';
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('posts-list').innerHTML = '';
            document.getElementById('empty').classList.add('hidden');

            try {
                const url = `/api/${agentId}/posts?userId=${userId}&token=${token}&status=${currentFilter}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('Query Rejected');
                
                posts = await res.json();
                updateAccountDropdown();
                renderPosts();

            } catch (err) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Network Fail: ${err.message}</p>`;
            }
        }

        function updateAccountDropdown() {
            const dropdown = document.getElementById('account-filter');
            const accounts = new Map();
            
            posts.forEach(p => {
                if (p.targetUrn) {
                    accounts.set(p.targetUrn, p.targetName || 'Instagram Account');
                }
            });

            let optionsHtml = '<option value="all">All Accounts</option>';
            accounts.forEach((name, urn) => {
                optionsHtml += `<option value="${urn}" ${currentAccountFilter === urn ? 'selected' : ''}>${name}</option>`;
            });
            dropdown.innerHTML = optionsHtml;
            lucide.createIcons();
        }

        function renderPosts() {
            const loading = document.getElementById('loading');
            const empty = document.getElementById('empty');
            const list = document.getElementById('posts-list');

            loading.classList.add('hidden');
            
            const filteredPosts = posts.filter(p => {
                if (currentAccountFilter === 'all') return true;
                return p.targetUrn === currentAccountFilter;
            });

            if (filteredPosts.length === 0) {
                document.getElementById('batch-actions').classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            document.getElementById('batch-actions').classList.remove('hidden');
            list.innerHTML = filteredPosts.map(post => {
                const isEditing = editingPostId === post.id;
                const statusColors = {
                    pending: 'bg-amber-50 text-amber-600 border-amber-100',
                    approved: 'bg-emerald-50 text-emerald-600 border-emerald-100',
                    rejected: 'bg-red-50 text-red-600 border-red-100'
                };

                const dateDisplay = post.scheduledAt 
                    ? new Intl.DateTimeFormat('en-US', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(post.scheduledAt))
                    : 'Immediate execution';

                const dateValue = post.scheduledAt ? post.scheduledAt.slice(0, 16) : '';

                return `
                    <div id="post-${post.id}" class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl shadow-slate-200/20 transition-all group relative overflow-hidden">
                        <div class="flex items-start justify-between mb-6">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 text-white flex items-center justify-center shadow-sm overflow-hidden">
                                    ${post.targetPic ? `<img src="${post.targetPic}" class="w-full h-full object-cover">` : '<i data-lucide="instagram" class="w-6 h-6"></i>'}
                                </div>
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Instance: ${post.id.slice(-6).toUpperCase()}</span>
                                        ${post.targetName ? `
                                            <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                                            <span class="text-[10px] font-bold text-pink-600 uppercase tracking-widest">${post.targetName}</span>
                                        ` : ''}
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <div class="px-3 py-1 ${statusColors[post.status]} rounded-lg text-[10px] font-black uppercase tracking-widest border">
                                            ${post.status}
                                        </div>
                                        ${post.scheduledAt ? `
                                            <div class="px-3 py-1 bg-slate-50 text-slate-500 rounded-lg text-[10px] font-black uppercase tracking-widest border border-slate-100 flex items-center gap-1.5">
                                                <i data-lucide="calendar" class="w-3 h-3"></i> ${dateDisplay}
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                ${!isEditing ? `
                                    <button onclick="startEdit('${post.id}')" class="p-2 text-slate-300 hover:text-pink-600 transition-colors">
                                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>

                        <div class="space-y-4">
                            ${isEditing ? `
                                <div class="space-y-4 p-6 bg-slate-50 rounded-[1.5rem] border-2 border-pink-100">
                                    <div class="space-y-2">
                                        <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Payload Content</label>
                                        <textarea id="edit-content-${post.id}" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-pink-500 focus:outline-none text-sm font-medium text-slate-700 min-h-[120px] custom-scrollbar">${post.content}</textarea>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="space-y-2">
                                            <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Media Resource URL</label>
                                            <input id="edit-media-${post.id}" type="url" value="${post.mediaUrl || ''}" class="w-full px-4 py-2 rounded-lg border border-slate-200 text-xs font-medium" placeholder="https://...">
                                        </div>
                                        <div class="space-y-2">
                                            <label class="text-[9px] font-black uppercase tracking-widest text-slate-400 ml-1">Synchronize At</label>
                                            <input id="edit-date-${post.id}" type="datetime-local" value="${dateValue}" class="w-full px-4 py-2 rounded-lg border border-slate-200 text-xs font-medium">
                                        </div>
                                    </div>
                                    <div class="flex gap-3 pt-2">
                                        <button onclick="saveEdit('${post.id}')" class="flex-1 bg-pink-600 text-white py-2 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-pink-700 transition-all">Commit Changes</button>
                                        <button onclick="cancelEdit()" class="px-6 py-2 bg-white border border-slate-200 text-slate-400 rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-slate-50">Cancel</button>
                                    </div>
                                </div>
                            ` : `
                                <div class="relative p-6 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                                    <p class="text-slate-600 text-sm leading-relaxed font-medium whitespace-pre-wrap">${post.content}</p>
                                </div>

                                ${post.mediaUrl ? `
                                    <div class="relative rounded-2xl overflow-hidden border border-slate-100 aspect-video bg-slate-100">
                                        <img src="${post.mediaUrl}" class="w-full h-full object-cover">
                                    </div>
                                ` : ''}

                                ${post.status !== 'completed' ? `
                                    <div class="pt-4 flex items-center gap-4">
                                        ${post.status === 'pending' ? `
                                            <button onclick="handleAction('${post.id}', 'approve')" class="flex-1 bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-xl font-black text-xs uppercase tracking-[0.2em] transition-all shadow-lg shadow-pink-600/20 flex items-center justify-center gap-2">
                                                <i data-lucide="check" class="w-4 h-4"></i> Approve
                                            </button>
                                        ` : post.status === 'approved' ? `
                                            <button onclick="handleAction('${post.id}', 'pending')" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-4 rounded-xl font-black text-xs uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-2">
                                                <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Pause
                                            </button>
                                        ` : ''}
                                        
                                        <button onclick="deletePost('${post.id}')" class="px-6 py-4 bg-white border border-slate-200 text-slate-400 hover:text-red-500 hover:border-red-100 hover:bg-red-50 rounded-xl font-black text-xs uppercase transition-all shadow-sm">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                ` : ''}
                            `}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function startEdit(postId) {
            editingPostId = postId;
            renderPosts();
        }

        function cancelEdit() {
            editingPostId = null;
            renderPosts();
        }

        async function saveEdit(postId) {
            const content = document.getElementById(`edit-content-${postId}`).value;
            const mediaUrl = document.getElementById(`edit-media-${postId}`).value;
            const scheduledAt = document.getElementById(`edit-date-${postId}`).value;

            try {
                const url = `/api/${agentId}/update`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, token, postId, content, mediaUrl, scheduledAt })
                });

                if (!res.ok) throw new Error('Update Rejected');
                editingPostId = null;
                fetchPosts();
            } catch (err) {
                alert('Update failed: ' + err.message);
            }
        }

        async function handleAction(postId, action) {
            try {
                const url = `/api/${agentId}/approve`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, token, postId, action })
                });

                if (!res.ok) throw new Error('Action Rejected');
                fetchPosts();
            } catch (err) {
                alert('Action failed: ' + err.message);
            }
        }

        async function deletePost(postId) {
            if (!confirm('Permanently wipe this entry?')) return;
            try {
                const url = `/api/${agentId}/delete`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, token, postId })
                });

                if (!res.ok) throw new Error('Wipe operation failed');
                fetchPosts();
            } catch (err) {
                alert('Wipe failed: ' + err.message);
            }
        }

        async function deleteAllMatching() {
            const filteredPosts = posts.filter(p => {
                if (currentAccountFilter === 'all') return true;
                return p.targetUrn === currentAccountFilter;
            });

            if (filteredPosts.length === 0) return;
            if (!confirm(`Flush ${filteredPosts.length} entries?`)) return;
            
            const postIds = filteredPosts.map(p => p.id);
            try {
                const url = `/api/${agentId}/batch-delete`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, token, postIds })
                });

                if (!res.ok) throw new Error('Batch wipe aborted');
                fetchPosts();
            } catch (err) {
                alert('Flush failed: ' + err.message);
            }
        }

        function openCreateModal() {
            document.getElementById('create-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
            document.getElementById('new-content').value = '';
            document.getElementById('new-media').value = '';
            document.getElementById('new-date').value = '';
        }

        async function submitCreatePost() {
            const content = document.getElementById('new-content').value;
            const mediaUrl = document.getElementById('new-media').value;
            const scheduledAt = document.getElementById('new-date').value;
            const btn = document.getElementById('submit-create-btn');

            if (!content) {
                alert('Empty payload content.');
                return;
            }

            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Enqueueing...';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const url = `/api/${agentId}/create`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, token, content, mediaUrl, scheduledAt })
                });

                if (!res.ok) throw new Error('Queue request failed');
                closeCreateModal();
                fetchPosts();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        fetchPosts();
    </script>
</body>
</html>
